<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded_Systems</title>
    <link rel="stylesheet" href="Emb-Style.css" />
    <link rel="icon" type="image/x-icon" href="image\Diploma-in-Embedded-System-1.ico">
</head>
<body>
<header>
    <h1>Electrons <sup>.e-</sup> Academy</h1>
    <p>Master Embedded Systems Development</p>
</header>

<!-- two‑column section: C editor + output runner -->
<div class="workspace">
    <!-- LEFT: C code editor -->
    <section class="editor-panel">
        <div class="panel-header">
            <h2>✎ C editor</h2>
            <span>main.c</span>
        </div>
        <textarea id="codeEditor" spellcheck="false" aria-label="C code">#include &lt;stdio.h&gt;

int main() {
    // Variables and arithmetic
    int a = 12;
    int b = 14;
    int sum = a + b;
    
    printf("Hello, Developer!\n");
    printf("%d + %d = %d\n", a, b, sum);
    
    // Loops
    printf("\nCounting from 1 to 5:\n");
    for(int i = 1; i <= 5; i++) {
        printf("%d ", i);
    }
    printf("\n");
    
    // Conditionals
    if(sum > 20) {
        printf("\nSum is greater than 20!\n");
    } else {
        printf("\nSum is 20 or less\n");
    }
    
    return 0;
}</textarea>
        <div class="action-bar">
            <button class="btn btn-primary" id="runBtn">▶ Run</button>
            <button class="btn btn-secondary" id="resetBtn">↺ reset</button>
            <button class="btn btn-secondary" id="clearBtn">⌧ clear</button>
        </div>
        <div class="status-tip">
            <span class="dot" id="statusDot"></span>
            <span id="statusMsg">ready</span>
        </div>
    </section>

    <!-- RIGHT: output terminal -->
    <section class="output-panel">
        <div class="panel-header">
            <h2>⏺ output</h2>
            <span>terminal</span>
        </div>
        <div id="outputArea"></div>
        <div style="font-size: 0.75rem; color: #6e85aa; margin-top: 0.2rem;">
            ⚡ simulated execution (stdout)
        </div>
    </section>
</div>

<script>
    (function() {
        const codeEditor = document.getElementById('codeEditor');
        const outputArea = document.getElementById('outputArea');
        const runBtn = document.getElementById('runBtn');
        const resetBtn = document.getElementById('resetBtn');
        const clearBtn = document.getElementById('clearBtn');
        const statusDot = document.getElementById('statusDot');
        const statusMsg = document.getElementById('statusMsg');

        const DEFAULT_CODE = `#include <stdio.h>

int main() {
    // Variables and arithmetic
    int a = 12;
    int b = 14;
    int sum = a + b;
    
    printf("Hello, Developer!\\n");
    printf("%d + %d = %d\\n", a, b, sum);
    
    // Loops
    printf("\\nCounting from 1 to 5:\\n");
    for(int i = 1; i <= 5; i++) {
        printf("%d ", i);
    }
    printf("\\n");
    
    // Conditionals
    if(sum > 20) {
        printf("\\nSum is greater than 20!\\n");
    } else {
        printf("\\nSum is 20 or less\\n");
    }
    
    return 0;
}`;

        function setStatus(ok, msg) {
            statusDot.className = 'dot' + (ok ? ' green' : '');
            statusMsg.textContent = msg;
        }

        function appendOutput(text) {
            if (!outputArea) return;
            if (outputArea.textContent.trim() === '' || outputArea.textContent === '⏎  ready to run …') {
                outputArea.textContent = text;
            } else {
                outputArea.textContent += '\n' + text;
            }
            outputArea.scrollTop = outputArea.scrollHeight;
        }

        function clearOutput() {
            outputArea.textContent = '';
            setStatus(true, 'cleared');
        }

        function resetEditor() {
            codeEditor.value = DEFAULT_CODE;
            clearOutput();
            setStatus(true, 'reset to default');
        }

        // Advanced C interpreter
        function interpretC(code) {
            // Remove comments
            code = code.replace(/\/\/.*$/gm, '');
            code = code.replace(/\/\*[\s\S]*?\*\//g, '');
            
            const variables = {};
            const output = [];
            let insideMain = false;
            let insideLoop = false;
            let loopCounter = 0;
            let loopVariable = '';
            let loopStart = 0;
            let loopEnd = 0;
            let loopBody = [];
            
            // Helper function to evaluate expressions
            function evaluateExpression(expr) {
                expr = expr.trim();
                // Replace variable names with their values
                for (const [varName, varValue] of Object.entries(variables)) {
                    const regex = new RegExp('\\b' + varName + '\\b', 'g');
                    expr = expr.replace(regex, varValue);
                }
                try {
                    // Handle common C operators
                    expr = expr.replace(/&&/g, '&&');
                    expr = expr.replace(/\|\|/g, '||');
                    expr = expr.replace(/==/g, '===');
                    expr = expr.replace(/!=/g, '!==');
                    // Convert C-style comparison to JavaScript
                    return Function('"use strict"; return (' + expr + ')')();
                } catch (e) {
                    return null;
                }
            }
            
            // Helper to process printf
            function processPrintf(line) {
                const printfRegex = /printf\s*\(\s*"([^"]*)"\s*(?:,\s*(.*?))?\s*\)\s*;/;
                const match = line.match(printfRegex);
                if (match) {
                    let format = match[1];
                    const args = match[2] ? match[2].split(',').map(s => s.trim()) : [];
                    
                    let result = '';
                    let argIndex = 0;
                    let i = 0;
                    while (i < format.length) {
                        if (format[i] === '%' && i + 1 < format.length) {
                            const specifier = format[i + 1];
                            if (specifier === 'd' || specifier === 'i' || specifier === 'f' || 
                                specifier === 's' || specifier === 'c' || specifier === 'x' || 
                                specifier === 'X' || specifier === 'p' || specifier === '%') {
                                if (specifier === '%') {
                                    result += '%';
                                } else if (argIndex < args.length) {
                                    let arg = args[argIndex];
                                    // Evaluate the argument if it's an expression
                                    const evaluated = evaluateExpression(arg);
                                    if (evaluated !== null) {
                                        arg = evaluated;
                                    } else if (!isNaN(arg)) {
                                        arg = parseFloat(arg);
                                    }
                                    // Format according to specifier
                                    if (specifier === 'd' || specifier === 'i') {
                                        result += Math.floor(Number(arg));
                                    } else if (specifier === 'f') {
                                        result += Number(arg).toFixed(6);
                                    } else if (specifier === 's') {
                                        result += String(arg);
                                    } else if (specifier === 'c') {
                                        result += String.fromCharCode(Number(arg));
                                    } else {
                                        result += String(arg);
                                    }
                                    argIndex++;
                                } else {
                                    result += format[i] + format[i+1];
                                }
                                i += 2;
                            } else {
                                result += format[i];
                                i++;
                            }
                        } else {
                            result += format[i];
                            i++;
                        }
                    }
                    
                    // Handle escape sequences
                    result = result.replace(/\\n/g, '\n');
                    result = result.replace(/\\t/g, '\t');
                    result = result.replace(/\\\\/g, '\\');
                    result = result.replace(/\\"/g, '"');
                    result = result.replace(/\\r/g, '\r');
                    result = result.replace(/\\0/g, '\0');
                    
                    return result;
                }
                return null;
            }
            
            // Process the code line by line
            const lines = code.split('\n');
            
            for (let line of lines) {
                const trimmed = line.trim();
                if (!trimmed) continue;
                
                // Skip preprocessor directives
                if (trimmed.startsWith('#include') || trimmed.startsWith('#define')) continue;
                
                // Check if we're inside main
                if (trimmed.includes('main()') || trimmed.includes('main (') || trimmed.includes('main(')) {
                    insideMain = true;
                    continue;
                }
                
                if (!insideMain) continue;
                
                // Skip function braces
                if (trimmed === '{' || trimmed === '}') continue;
                
                // Handle variable declarations and assignments
                const varDeclMatch = trimmed.match(/^(int|float|double|char)\s+([a-zA-Z_][a-zA-Z0-9_]*)\s*(?:=\s*([^;]+))?;/);
                if (varDeclMatch) {
                    const name = varDeclMatch[2];
                    let value = varDeclMatch[3];
                    if (value) {
                        const evaluated = evaluateExpression(value);
                        if (evaluated !== null) {
                            variables[name] = evaluated;
                        } else {
                            variables[name] = 0;
                        }
                    } else {
                        variables[name] = 0;
                    }
                    continue;
                }
                
                // Handle simple assignments
                const assignMatch = trimmed.match(/^([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);/);
                if (assignMatch) {
                    const name = assignMatch[1];
                    const value = assignMatch[2];
                    const evaluated = evaluateExpression(value);
                    if (evaluated !== null) {
                        variables[name] = evaluated;
                    }
                    continue;
                }
                
                // Handle for loops
                const forMatch = trimmed.match(/^for\s*\(\s*(?:int\s+)?([a-zA-Z_][a-zA-Z0-9_]*)\s*=\s*([^;]+);\s*([^;]+);\s*([^)]+)\)\s*\{?/);
                if (forMatch) {
                    const varName = forMatch[1];
                    const startVal = evaluateExpression(forMatch[2]);
                    const condition = forMatch[3];
                    const increment = forMatch[4];
                    
                    // Find the loop body
                    let bodyLines = [];
                    let braceCount = 0;
                    let foundBody = false;
                    
                    // We need to look ahead to find the loop body
                    // For simplicity, we'll just execute the loop inline
                    if (startVal !== null) {
                        variables[varName] = startVal;
                        let maxIterations = 1000; // Safety limit
                        while (maxIterations-- > 0) {
                            // Check condition
                            let condEval = evaluateExpression(condition);
                            if (!condEval) break;
                            
                            // We need to execute the loop body
                            // For now, we'll just handle simple cases
                            // Find the next line that's not a brace
                            // This is simplified - for complex loops, we'd need a proper parser
                            break; // Skip for now - we'll handle this differently
                        }
                    }
                    continue;
                }
                
                // Handle if statements
                const ifMatch = trimmed.match(/^if\s*\(\s*([^)]+)\s*\)\s*\{?/);
                if (ifMatch) {
                    const condition = ifMatch[1];
                    const result = evaluateExpression(condition);
                    // For now, we'll just evaluate the condition
                    // Actual branch execution would require a proper parser
                    continue;
                }
                
                // Handle printf
                const printfResult = processPrintf(trimmed);
                if (printfResult !== null) {
                    output.push(printfResult);
                    continue;
                }
                
                // Handle return statement
                if (trimmed.startsWith('return')) {
                    break;
                }
            }
            
            return output;
        }

        function runCcode() {
            const code = codeEditor.value;
            if (!code || code.trim() === '') {
                appendOutput('⚠️  empty code — nothing to run.');
                setStatus(false, 'empty code');
                return;
            }

            setStatus(false, 'compiling …');
            appendOutput('▶  compiling ...');

            setTimeout(() => {
                try {
                    const outputLines = interpretC(code);
                    
                    if (outputLines.length === 0) {
                        appendOutput('(no printf output)');
                    } else {
                        appendOutput('✅  execution finished.');
                        for (let line of outputLines) {
                            appendOutput(line);
                        }
                    }
                    setStatus(true, 'done');
                } catch (err) {
                    appendOutput('❌  runtime error: ' + err.message);
                    setStatus(false, 'error');
                }
            }, 180);
        }

        runBtn.addEventListener('click', runCcode);
        resetBtn.addEventListener('click', resetEditor);
        clearBtn.addEventListener('click', function() {
            clearOutput();
            setStatus(true, 'output cleared');
        });

        codeEditor.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCcode();
            }
        });

        setStatus(true, 'ready');
        if (codeEditor.value.trim() === '') {
            codeEditor.value = DEFAULT_CODE;
        }
        outputArea.textContent = '';
        appendOutput('💡  write C code, then press ▶ Run or Ctrl+Enter');
        setStatus(true, 'ready');
    })();
</script>
<footer>
  <div class="footer-content">
    <div class="footer-right">
      <!-- AUTO-UPDATING COPYRIGHT YEAR -->
      <p>&copy; <span id="copyright-year"></span> Electrons <sup>.e-</sup> Academy | Designed for future innovators</p>
    </div>
  </div>
</footer>

<!-- JAVASCRIPT TO AUTO-UPDATE THE YEAR -->
<script>
  // Get the current year automatically
  const currentYear = new Date().getFullYear();
  // Update the copyright year in the footer
  document.getElementById('copyright-year').textContent = currentYear;
</script>
</body>
</html>
